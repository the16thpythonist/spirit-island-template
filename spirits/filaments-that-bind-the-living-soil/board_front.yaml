type: board_front
spirit_name: "Filaments That Bind the Living Soil"
spirit_image: filaments-that-bind-the-living-soil_art.png
spirit_image_scale: "100%"
spirit_image_position: "-250px center"

custom_icons:
  spore: spore_token.png

special_rules:
  - subtitle: "Spore Tokens"
    rule: >
      Each {spore} in a land grants Defend 1 to that land (stacks).
      {spore} can be consumed by your powers and innate abilities for stronger effects.
  - subtitle: "Withered by Sun and Sand"
    rule: >
      At the end of each turn, destroy all {spore} in {sand}.
  - subtitle: "Natural Spread"
    rule: >
      At the end of each turn, if a land has 2+ {spore}, you may move 1 {spore} to an adjacent land.

growth:
  title: "Growth (Pick Two)"
  groups:
    - values: "add-presence(1,spore)"
    - values: "add-token(0,spore);gain-energy(1)"
    - values: "gain-card-play;custom(Push up to 2 Spores,spore)"
    - values: "gain-power-card;custom(May discard to place 1 Spore on each Sacred Site,spore,sacred-site)"
    - values: "custom(Remove 1 Spore,no-spore);reclaim-all;gain-energy(3)"

presence_tracks:
  card_play_track:
    values: "1,2,reclaim-one,2,3"
  energy_track:
    values: "1,plant,2,2,3,4"

innate_powers:
  - name: "Nourish Through the Network"
    speed: fast
    range: "0"
    target: "{spore}"
    target_title: "TARGET LAND"
    levels:
      - threshold: "1-plant,1-earth"
        content: >
          Another {spirit} with {presence} there gains 1 Energy.
      - threshold: "2-plant,2-earth"
        content: >
          Also, another {spirit} there may gain 1 Energy.
      - threshold: "2-plant,2-earth,1-moon"
        content: >
          Also, one of those {spirit} may Repeat 1 of their Slow Powers this turn by removing 1 {spore}.

  - name: "Quiet Decomposition"
    speed: slow
    range: "sacred-site,1"
    target: "{spore}"
    target_title: "TARGET LAND"
    levels:
      - threshold: "1-plant,1-water"
        content: >
          1 Damage per {spore} in target land (max 3).
      - threshold: "2-plant,1-water,1-earth"
        content: >
          Also, Push up to 2 {explorer} from target land.
      - threshold: "3-plant,1-water,1-earth"
        content: >
          Also, place 1 {spore} on an adjacent land with your {presence}.

art_prompt: "A vast underground fungal network of glowing mycelium filaments connecting tree roots beneath a lush jungle floor, bioluminescent tendrils spreading through dark soil, mystical nature spirit"
